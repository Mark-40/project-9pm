services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-trader-backend
    ports:
      - "8000:8000"
    environment:
      - BINANCE_WS_URL=wss://stream.binance.com:9443/stream
      - BINANCE_REST_URL=https://api.binance.com
      - SYMBOLS=["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT"]
      - KLINE_INTERVAL=1h
      - KLINE_BUFFER_SIZE=500
      - ML_ARTIFACTS_DIR=/app/ml/artifacts
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - LOG_LEVEL=INFO
    volumes:
      - ml_artifacts:/app/ml/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto-trader-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ml_artifacts:
    # Persists trained XGBoost models across container restarts
    # so we don't retrain from scratch on every deploy
